<!doctype html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="../js/lib/puzzlescript/puzzlescript.min.js"></script>

<style>

body { padding: 0; margin: 0; }

.container {
  width: 100%; height: 100vh;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 32px;
  font-family: sans-serif;
}

.header {
  width: 80%;
  height: 10%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.footer {
  height: 10%;
  width: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #888;
}


#gameCanvas { width: 80%; height: 80%; display: block; }

#play { width: 120px; }

.btn:disabled {
  opacity: 0.5;
}

.btn-prev:after {
  content: '❮';
}

.btn-next:after {
  content: '❯';
}

.btn:hover {
  opacity: 1;
}

.hidden {
  visibility: hidden;
}

/*
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 2px;

*/

.controls {
  position: absolute;
  padding: 16px;
  max-width: 200px;
}

.btn {
  padding-top: 2px;
  margin-top: 2px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background-color: rgba(128, 128, 128, 0.5);
  border: none;
  color: white;
  fill: white;
  font-size: 18px;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s ease, opacity 0.2s ease;
  user-select: none;
  touch-action: manipulation;
  overflow: hidden;
  outline: none;
  box-shadow: none;
  appearance: none;
  border: 0;
  z-index: 1000;
  opacity: 0.75;
}

.middle {top: 50%; transform: translateY(-50%);}
.center {left: 50%; transform: translateX(-50%); }
.top { top: 0; }
.right { right: 0; }
.left { left: 0; }
.bottom { bottom: 0; }

.pr { right: 60px }





#moves {
  display: flex;
  align-items: baseline;
  font-family: Arial, sans-serif;
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

#moves-before,
#moves-after {
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#moves-before {
  direction: rtl;
  text-align: right;
}

#moves-after {
  direction: ltr;
  text-align: left;
}

#moves-at {
  flex: 0 0 auto;
  color: white;
}











</style>

<body>

<title>Solution Player, use [ ] to play</title>

<div class="controls top left">
  <button class="btn btnFn" id="firstLevel" title="first">1</button>
  <button class="btn btnFn" id="nextLevel" title="next">2</button>
  <button class="btn btnFn" id="lastLevel" title="last">3</button>
  <button class="btn btnFn" id="solve" title="solve">E</button>
  <button class="btn btnFn" id="reset" title="reset">R</button>
</div>

<div class="controls top right pr">
  <select id="levelSelect" onchange="loadLevel(this.value)"></select>
</div>

<div class="controls top right hidden">
  <button class="btn btnFn" id="pin" title="pin">&#x1F4CC;</button>
  <button class="btn btnFn" id="close" title="close">&#x2716;</button>
</div>

<div class="controls bottom left">
  <button class="btn btnFn" id="undo" title="undo">Z</button>
  <button class="btn btnFn" id="action" title="action">X</button>
  <button class="btn btnFn" id="swap" title="swap">C</button>
</div>

<div class="controls bottom right">
  <button class="btn btnMove hidden" id="up">&uarr;</button>
  <button class="btn btnMove" id="up">&uarr;</button>
  <br/>
  <button class="btn btnMove" id="left">&larr;</button>
  <button class="btn btnMove" id="down">&darr;</button>
  <button class="btn btnMove" id="right">&rarr;</button>
  </div>
</div>

<div class="controls left middle">
  <button class="btn btnFn btn-prev" id="prevLevel" title="prev"></button>
</div>

<div class="controls right middle">
  <button class="btn btnFn btn-next" id="nextLevel" title="next"></button>
</div>


<div class="container">
  <div class="header"><span id="title"></span></div>
  <canvas id="gameCanvas"></canvas>
  <div class="footer">

    <span id="moves">
      <span id="moves-before"></span>[<span id="moves-at"></span>]<span id="moves-after"></span>
    </span>

  </div>
</div>

<a href="https://github.com/joric/ootss/wiki/#solutions" target="_blank" class="github-corner" aria-label="View source on GitHub"><svg width="80" height="80" viewBox="0 0 250 250" style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"/><path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"/><path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"/></svg></a><style>.github-corner:hover .octo-arm{animation:octocat-wave 560ms ease-in-out}@keyframes octocat-wave{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-25deg)}40%,80%{transform:rotate(10deg)}}@media (max-width:500px){.github-corner:hover .octo-arm{animation:none}.github-corner .octo-arm{animation:octocat-wave 560ms ease-in-out}}</style>

<script>
  document.querySelectorAll('.btnKey').forEach(c=>{ c.onclick = e=> { sendKey(e.target.id); } });
  document.querySelectorAll('.btnFn').forEach(c=>{ c.onclick = e=> { 
    //console.log(typeof window[e.target.id]);
    if (typeof window[e.target.id] === 'function') window[e.target.id](); }
  });

  document.querySelectorAll('.btnMove').forEach(c=>{
    c.onmousedown = c.ontouchstart = e=>{ e.preventDefault(); move(e.target.id); };
    c.onmouseup = c.onmouseout = c.ontouchend = ()=>pressed={};
  });


let puzzleScript = null;
let solutions = {};
let cleanedData = null;
let name = 'heroes1_1';
let timer = null;
let previousRef = -1;
let pos = 0;
let playDelay = 150;
let levelRanges = {};
let levelNames = {};
let paused = false;

const unpackSolution = s => s.replace(/([A-Z])(\d+)/g, (_,l,n)=>l.repeat(+n));
const convertSolution = s => unpackSolution(s).toLowerCase();

const keyCodes = {
  // solution keycodes
  r: 39, // right
  l: 37, // left
  u: 38, // up
  d: 40, // down
  x: 88, // X
  c: 67, // C
  v: 86, // V

  // other keycodes
  undo: 90, // Z
  reset: 82, // R
  digit1: 49,
  digit2: 50,
  digit3: 51,
};

function sendKey(id) {
  sendMove(keyCodes[id]);
}

function move(id) {
  if (id === 'left') {
    sendMove(keyCodes.l);
  } else if (id === 'right') {
    sendMove(keyCodes.r);
  } else if (id === 'up') {
    sendMove(keyCodes.u);
  } else if (id === 'down') {
    sendMove(keyCodes.d);
  }
}

function pin() {
  window.location.href = `../index.html#${name}`;
}

function close() {
  window.location.href = `../index.html`;
}

function redo() {
  sendNextMove()
}

function swap() {
  sendMove(keyCodes.c);
}

function action() {
  sendMove(keyCodes.x)
}

function reset() {
  sendMove(keyCodes.reset);
  stopSolution();
}

function undo() {
  sendMove(keyCodes.undo); // Z
  if (pos > 0) {
    pos--;
  }
  showSolution();
}

function showSolution() {
  let solution = convertSolution(solutions[name]).toUpperCase();

  let at = solution[pos] || ' ';
  let before = solution.slice(0, pos);
  let after = solution.slice(pos + 1);

  if (pos>=solution.length) {
    at = '*';
    before='';
    after='';
  }


  document.getElementById('moves-before').textContent = before;
  document.getElementById('moves-at').textContent = at;
  document.getElementById('moves-after').textContent = after;
}

function playSolution() {
  showSolution();
  if (!timer) {
    timer = setInterval(sendNextMove, playDelay);
    //document.getElementById('play').textContent = 'Pause (E)';
  }
}

function pauseSolution() {
  showSolution();
  if (timer) {
    clearInterval(timer);
    timer = null;
    console.log('Paused.');
    //document.getElementById('play').textContent = 'Solve (E)';
  }
}

function solve() {
  if (!timer) {
    playSolution();
  } else {
    pauseSolution();
  }
}

function stopSolution() {
  pos = 0;
  pauseSolution();
  console.log('Stopped and rewound.');
}

function onLevelLoaded(levelName) {
  const select = document.getElementById('levelSelect');
  if (select) select.value = name;

  location.hash = name;
  pos = 0;
  name = levelName;

  let i = levelNames.indexOf(name);
  let n = levelNames.length;

  document.getElementById('title').textContent = `(${i+1}/${n}) ${name}`;

  let playing = timer != null;

  stopSolution();

  if (playing) {
    setTimeout(function(){ playSolution() }, 250);
  }
}

function stepLevel(step) {
  let i = levelNames.indexOf(name) + step;
  if (step==0) i = 0;
  if (i<0) return;
  if (i>=levelNames.length+1) i = levelNames.length-1;
  if (i>=levelNames.length) return;
  loadLevel(levelNames[i]);
}

function prevLevel(){
  stepLevel(-1);
}

function firstLevel(){
  stepLevel(0);
}

function nextLevel(){
  stepLevel(1);
}

function lastLevel(){
  stepLevel(9999);
}

function extractLevelNames(sourceText) {
  const lines = sourceText.split('\n');
  const labels = [];

  for (let i = 0; i < lines.length; i++) {
    const match = lines[i].match(/^\s*\(level\s*(.+?)\)\s*$/i);
    if (match) {
      labels.push({ line: i + 1, name: match[1] }); // 1-indexed to match PS lineNumber convention
    }
  }

  // sort just in case labels weren't strictly in source order
  labels.sort((a, b) => a.line - b.line);

  // build ranges: [thisLabel.line, nextLabel.line) -> name
  const ranges = labels.map((label, idx) => {
    const nextLine = idx + 1 < labels.length ? labels[idx + 1].line : Infinity;
    return { start: label.line, end: nextLine, name: label.name };
  });

  return ranges;
}

function lookupLevelName(ranges, lineNumber) {
  for (const r of ranges) {
    if (lineNumber >= r.start && lineNumber < r.end) {
      return r.name;
    }
  }
  return undefined;
}

function monitorLevelUpdate() {
  if (window.level.lineNumber !== previousRef) {
    previousRef = window.level.lineNumber;
    const levelName = lookupLevelName(levelRanges, previousRef);
    console.log(`New level event, line ${previousRef}, possibly "${levelName}".`);
    if (levelName) {
      onLevelLoaded(levelName);
    }
  }
}

function loadLevel(levelName) {
  let levelNumber = levelNames.indexOf(levelName);
  console.log('Loading level', levelNumber, levelName);
  puzzleScript.puzzleScript.compile(['loadLevel', levelNumber], cleanedData);
  name = levelName;
  pos = 0;
}

function dispatchFakeKey(type, code) {
  const fakeEvent = new KeyboardEvent(type, {
    bubbles: true,
    cancelable: true,
  });
  Object.defineProperty(fakeEvent, 'keyCode', { get: () => code });
  Object.defineProperty(fakeEvent, 'which', { get: () => code });
  document.dispatchEvent(fakeEvent);
}

function sendMove(code) {
  const canvas = document.getElementById('gameCanvas');
  canvas.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));

  showSolution();

  dispatchFakeKey('keydown', code);
  dispatchFakeKey('keyup', code);
}

function sendNextMove() {
  let solution = convertSolution(solutions[name]);

  if (pos < solution.length) {
    const ch = solution[pos].toLowerCase();

    //console.log('sending', ch, 'of', solution.slice(pos), 'at', pos, 'from', name);

    const code = keyCodes[ch];
    if (code !== undefined) {
      sendMove(code);
      pos++;
      //console.log(`[${pos}/${solution.length}] sent '${ch}'`);
    } else {
      console.warn(`Unknown symbol '${ch}' at position ${pos}, skipping`);
      pos++;
    }
  } else {
    console.log('Solution complete.');
    pos = 0;
    pauseSolution();
  }

  showSolution();
}

window.onload = () => {

  (function () {

    document.addEventListener('keydown', function (e) {
      //console.log(e);
      //if (e.repeat) return;

      switch (e.code) {
        case 'BracketRight':
          e.preventDefault();
          redo();
          break;
        case 'BracketLeft':
          e.preventDefault();
          undo();
          break;
        case 'KeyR':
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            location.reload();
          } else {
            stopSolution();
            console.log('Rewound to start.');
          }
          break;
        case 'KeyZ':
          if (e.shiftKey) stepLevel(-1);
          break;
        case 'KeyX':
          if (e.shiftKey) stepLevel(1);
          break;
        case 'KeyE':
          solve();
          break;

        case 'KeyW': case 'ArrowUp':
        case 'KeyA': case 'ArrowLeft':
        case 'KeyS': case 'ArrowDown':
        case 'KeyD': case 'ArrowRight':
          pos+=1;
          showSolution();
        break;


        case 'Digit1': firstLevel(); break;
        case 'Digit2': nextLevel(); break;
        case 'Digit3': lastLevel(); break;
          
        default:
          break;
      }
    });

  })();

  fetch('../data/solutions.txt').then(r => r.text()).then(data => {
    solutions = Object.fromEntries(data.split('\n').map(s => s.trim().split(':', 2)).filter(([, v])=> v && v.length>=2));
    const a = Object.values(solutions).map(s=>s.length);
    if (a) {
      console.log(`${a.length} solutions`);
    }
  });

  fetch('ootss.ps').then(r => r.text()).then(data => {
    cleanedData = data.replace(/\r\n/g, '\n');
    puzzleScript = new PuzzleScript();
    //puzzleScript.compile(cleanedData);

    levelRanges = extractLevelNames(cleanedData);
    levelNames = levelRanges.map(r => r.name);

    console.log(`Loaded ${levelNames.length} levels.`);

    const select = document.getElementById('levelSelect');
    if (select) {
      select.innerHTML = '';
      levelNames.forEach( name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
      });
    }

    setInterval(monitorLevelUpdate, 20);
    
    let levelName = levelNames[0];

    if (location.hash) {
      levelName = location.hash.slice(1);
    }

    loadLevel(levelName);

    // send mute
    dispatchFakeKey('keydown', 77); // 77 = 'M'
    dispatchFakeKey('keyup', 77);

  });

}

</script>
</body>
</html>
