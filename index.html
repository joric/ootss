html, body, #map { width:100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }

  position: relative;

.marker-label {
  position: absolute;

  color: white;

#galleryOverlay {

  inset: 0;
  background: rgba(0, 0, 0, 0.92);
  z-index: 9999;

#galleryOverlay.open {

#closeBtn {

<script>

let map = null;
let markerGroup = null;
let images = [];

function focusMarkerByName(name) {
  let found = null

  map.eachLayer((layer) => {

    if (layer instanceof L.Marker) {
      console.log(layer);
      if (layer.feature.properties.name === name) found = layer;
    }
  })

  if (!found) return;

  map.flyTo(found.getLatLng(), map.getZoom(), { duration: 0.2 })
  map.once('moveend', () => {
    found.fire('click');
    found.closeTooltip();
  })
}

let mainSwiper = null;
let thumbSwiper = null;

function updateCaption() {
  const record = images[mainSwiper.activeIndex]
  if (!record) return
  caption.innerHTML = `
    <div class="caption-title">${record.title || ''}</div>
    <div class="caption-subtitle">${record.area || ''}</div>
  `
}

function openImage(name) {
  const index = images.findIndex((item) => item.name === name);
  const overlay = document.getElementById('galleryOverlay')
  overlay.classList.add('open')
  requestAnimationFrame(() => {
    mainSwiper.update()
    thumbSwiper.update()
    mainSwiper.slideTo(index, 0);
    thumbSwiper.slideTo(index, 0)
    updateCaption()
  })
}

function initImages() {
  const overlay = document.getElementById('galleryOverlay')
  const closeBtn = document.getElementById('closeBtn')
  const main = document.getElementById('main')
  const thumbs = document.getElementById('thumbs')

  for (const item of images) {
    main.insertAdjacentHTML('beforeend',
      `<div class="swiper-slide">
        <div class="slide-bg" style="background-image: url('${item.src}')"></div>
      </div>`
    )
    thumbs.insertAdjacentHTML('beforeend',
      `<div class="swiper-slide" title="${item.title} (${item.area})">
        <div class="slide-bg" style="background-image: url('${item.src}')"></div>
      </div>`
    )
  }

  thumbSwiper = new Swiper('.thumbSwiper', {
    spaceBetween: 1,
    slidesPerView: 'auto',
    watchSlidesProgress: true,
    centeredSlides: true,
    centeredSlidesBounds: true,

    freeMode: {
      enabled: true,
      momentum: true,
      momentumRatio: 1,
      momentumVelocityRatio: 1,
      sticky: false,
    },
    mousewheel: {
      sensitivity: 1,

      thresholdDelta: 0,
      thresholdTime: 0,

    },
    speed: 150,
  })

  mainSwiper = new Swiper('.mainSwiper', {
    spaceBetween: 10,
    thumbs: {
      swiper: thumbSwiper,
    },

      speed: 150,

    keyboard: {
      enabled: true,
      onlyInViewport: false,
    },
    mousewheel: {
      sensitivity: 1,
      releaseOnEdges: true,

      thresholdDelta: 0,
      thresholdTime: 0,


    },

    mousewheel: true,
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
  })

  mainSwiper.on('slideChange', () => {
    updateCaption()
    thumbSwiper.slideTo(mainSwiper.activeIndex)
  })


  function closeGallery() {
    overlay.classList.remove('open')
  }

  closeBtn.onclick = closeGallery

  function handleImageActivate() {
    const record = images[mainSwiper.activeIndex]
    closeGallery()
    if (record) {
      focusMarkerByName(record.name)
    }
  }


  mainSwiper.on('click', (swiper, event) => {
    if (event.target.classList.contains('slide-bg')) {
      handleImageActivate()
    }
  })

  document.addEventListener('keydown', (e) => {
    if (!overlay.classList.contains('open')) return

    if (e.key === 'Escape') {
      closeGallery()
    }

    if (e.key === 'Enter') {
      e.preventDefault();
      handleImageActivate();
    }

  })


}



//----------------------------------------

function updateMarkerLabels() {
  const currentZoom = map.getZoom();
  const showLabels = currentZoom >= 5; // Adjust threshold as needed
  document.querySelectorAll('.marker-label').forEach(label => {
    label.style.display = showLabels ? 'block' : 'none';
    //label.style.fontSize = (currentZoom*3) + 'px';
  });
}

function copyToClipboard(text) {
  let input = document.body.appendChild(document.createElement("input"));
  input.value = text;
  const prev = document.activeElement;
  input.focus();
  input.select();
  document.execCommand('copy');
  input.parentNode.removeChild(input);
  if (prev) prev.focus();
  document.getElementById('alert').classList.remove('closed');
  setTimeout(function(e){ document.getElementById('alert').classList.add('closed') },1500);
}

function drawMap() {
  // old map was 1920x1080 and the grid was almost precisely 10 pixels
  // center was at 860, 740
  // so basically an overhead screenshot is 192x108 grid
  // with grid center at cell 86,74 if count from top left corner

  let d = 192;

  let m = {
    size: d,

    bounds: [[0,0],[192,192]],

    center: [10,-20],

    flip_y: false,
  }

  let tileSize = 512; // this is essentially map size in tiles on zoom level 0
  let size = tileSize*tileSize; // default map width in pixels is tileSize squared

  // custom map weighted (scaled) dimensions (usually 0..1)
  let [sw,sh] = [m.size, m.size].map(e => e / size);
  let [sx,sy] = m.center.map(e => e / size);

  // calculate factor and offset for the custom map
  let factor = 1 / tileSize / sw;
  let dx = (.5 - sx / sw) * tileSize;
  let dy = (.5 - sy / sh) * tileSize;

  // correct bounds (still need to flip x and y for leaflet)
  let [w,h] = [m.size, m.size];
  let [x,y] = m.center;

  let [[left,top],[right,bottom]] = m.bounds;
  let bounds = [[top, left], [bottom, right]];
  let center = [(m.flip_y ? -1 : 1) * y, x];

  // crs.transformation represents an affine transformation:
  let crs = L.CRS.Simple;
  // a set of coefficients a, b, c, d for transforming a point of a form (x,y) into (a*x + b, c*y + d)
  crs.transformation = new L.Transformation(factor, dx, (m.flip_y ? -1 : 1) *  factor, dy); // Invert the y-axis

  map = L.map('map', {
    crs: crs,
    zoom: 2,
    center: center,
    zoomControl: false,
    maxZoom: 8,
  });

  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.control.mousePosition({lngFirst: true, latFormatter:Math.round, lngFormatter:Math.round }).addTo(map);

  // Fit map to image bounds
  //map.fitBounds(bounds);

  markerGroup = L.layerGroup().addTo(map);


/*
  map.on('mousemove', function(e) {
    let p = {x:e.latlng.lng, y:e.latlng.lat};
    document.title = 'X:' + p.x.toFixed(0) + ' Y:' + p.y.toFixed(0);
  });
*/
/*
  map.on('click', e => {
      var lng = e.latlng.lng;
      var lat = e.latlng.lat;


      let cellSize = 1;


      let x = Math.round(lng / cellSize) * cellSize
      let y = Math.round(lat / cellSize) * cellSize


      let t = `[${x}, ${y}]`;

      //navigator.clipboard.writeText(t);
      // Open popup
      //L.popup().setLatLng(e.latlng).setContent(t + '<br>(copied to clipboard)').openOn(map);

      console.log(t);
  });
*/


  fetch('data/markers.json').then(r=>r.json()).then(data=>{

    counters = {};

    let layers = {};

    let cellSize=17.5;
    let iw = 2044;
    let ih = 1999;

    let tw = iw/cellSize;
    let th = ih/cellSize;

    let dx=-62.15;
    let dy=-57.8;

    let top = dy;
    let left = dx;
    let bottom = th+dy;
    let right = tw+dx;

    let imageLayer = L.imageOverlay('images/SPOILER_image.jpg', [[top,left],[bottom,right]],{
      attribution: '<a href="https://youtu.be/OIxuGF6CwnU" target=_blank>YouTube</a>',
    });//.addTo(map);

    layers['SPOILER_image'] = imageLayer;

    images = [];

    for (const feature of data.features) {

      let title = feature.properties.name;
      let name = feature.properties.name;
      let area = feature.properties.area;

      if (area != 'locations') {
        images.push( {src: `images/levels/${name}.webp`, name: name, area: area, title: title});
      }

      let latlng = [feature.geometry.coordinates[1],feature.geometry.coordinates[0]];

      if (!latlng) continue;

      let marker = L.marker(latlng, {
        icon: L.divIcon({
          html: `
            <div class="custom-marker-container">
              <div class="marker-icon"></div>
              <div class="marker-label">${title}</div>
            </div>
          `,
          className: 'custom-marker', // for additional styling
          iconSize: [30, 50], // [width, height] - MUST include space for label
          iconAnchor: [15, 40] // [x, y] - point of the icon that corresponds to marker location
        }),

        searchText: (title).toLowerCase(),
      })

      //let marker = L.marker(convert(feature.geometry.coordinates));

      counters[feature.properties.area] = (counters[feature.properties.area]||0) +1;

      marker.feature = feature;

      const getCoordinates = marker=>`${marker.feature.geometry.coordinates[0]},${marker.feature.geometry.coordinates[1]}`;


      marker.bindTooltip(marker => `<b>${marker.feature.properties.name}</b><br/>${marker.feature.properties.area} (${getCoordinates(marker)})`, {offset: [15,-25]});

      //marker.bindPopup(marker => { return `<div class="image-wrapper"><img src="images/levels/${marker.feature.properties.name}.webp"></div>`}, {

      marker.on('click', () => {
        const props = marker.feature.properties;
        const name = props.name;

        const buildWrapper = (bodyHTML) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'image-wrapper';
          wrapper.innerHTML = `
            <div class="popup-header"><a href="javascript:copyToClipboard('${props.name}')"><b>${props.name}</b></a><br>${props.area} (${getCoordinates(marker)})</div>
            ${bodyHTML}
            ${props.solution && '<hr><span class="wrap"><a href="https://github.com/joric/ootss/wiki#solutions" target=_blank>'+props.solution+'</a></span>'||''}
          `;
          return wrapper;
        };

        const img = new Image();
        img.src = `images/levels/${name}.webp`;

        img.onload = () => {
          const wrapper = buildWrapper(`<hr><a href="javascript:openImage('${name}');"><img class="popup-image" src="${img.src}"></a>`);
          marker.unbindPopup();
          marker.bindPopup(wrapper, { offset: [0, -35], maxWidth: 360, minWidth: 360 });
          marker.openPopup();
        };

        img.onerror = () => {
          const wrapper = buildWrapper(`<div class="image-error"></div>`);
          marker.unbindPopup();
          marker.bindPopup(wrapper, { offset: [0, -35] });
          marker.openPopup();
        };
      });



      if (!layers[feature.properties.area]) {
        layers[feature.properties.area] = L.layerGroup().addTo(markerGroup);
      }

      marker.addTo(layers[feature.properties.area]);

    }

    //console.log('total', data.features.length);
    //console.log(counters);

    let text =`Total markers: ${data.features.length}`;

    let alt = ''
    for (k in counters) {
      alt += `\n${k}: ${counters[k]}`;
    }

    document.querySelector('#info').innerHTML = text;
    document.querySelector('#info').title = alt;

    let baseLayers={}

    var blankTileLayer = L.tileLayer('https://via.placeholder.com/1x1/000000/ffffff?text=blank', {
        attribution: 'Blank Map'
    });

    baseLayers['blank'] = blankTileLayer;

    let tilesLayer = L.tileLayer('tiles/{z}/{y}/{x}.webp', {
      tileSize: 512,
      maxNativeZoom: 5,
      attribution: '<a href="https://github.com/joric/ootss/wiki" target=_blank>Joric\'s OotSS Map</a>',
    }).addTo(map);

    baseLayers['Demo2_16k'] = tilesLayer;

    // update overlay names to include count
    var overlaysWithCounts = Object.fromEntries(
      Object.entries(layers).map(([name, layer]) => [
        `${name}${typeof layer.getLayers === 'function' ? ' ('+layer.getLayers().length+')' : ''}`,
        layer
      ])
    );

    let layercontrol = L.control.layers(baseLayers, overlaysWithCounts, {collapsed: false, position: 'topright'}).addTo(map);


    map.on('zoom overlayadd', updateMarkerLabels);


    updateMarkerLabels();

    searchControl = new L.Control.Search({propertyName: 'searchText', initial: false, layer: markerGroup, hideMarkerOnCollapse: true}).addTo(map);

    initImages();

  })

  const svgLayer = L.svg({padding: 2}).addTo(map);
  const svg = svgLayer._container;

  function drawGrid() {

    while (svg.firstChild) svg.removeChild(svg.firstChild);

    //if (map.getZoom() <= 6) return;

    const size = 2048;

    const topLeft = map.containerPointToLatLng([0,0]);
    const bottomRight = map.containerPointToLatLng([map.getSize().x,map.getSize().y]);

    const spacing = 10;

    const minX = Math.max(0, Math.floor(Math.min(topLeft.lng, bottomRight.lng)));
    const maxX = Math.min(size, Math.ceil(Math.max(topLeft.lng, bottomRight.lng)));
    const minY = Math.max(0, Math.floor(Math.min(topLeft.lat, bottomRight.lat)));
    const maxY = Math.min(size, Math.ceil(Math.max(topLeft.lat, bottomRight.lat)));

    let stroke = 'rgba(255,255,255,0.75)';

    for (let x = minX; x <= maxX; x += spacing) {
      const p1 = map.latLngToLayerPoint([minY, x]);
      const p2 = map.latLngToLayerPoint([maxY, x]);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', p1.x);
      line.setAttribute('y1', p1.y);
      line.setAttribute('x2', p2.x);
      line.setAttribute('y2', p2.y);
      line.setAttribute('stroke', stroke);
      line.setAttribute('stroke-width', x%16==0 ? '2':'1');
      svg.appendChild(line);
    }

    for (let y = minY; y <= maxY; y += spacing) {
      const p1 = map.latLngToLayerPoint([y, minX]);
      const p2 = map.latLngToLayerPoint([y, maxX]);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', p1.x);
      line.setAttribute('y1', p1.y);
      line.setAttribute('x2', p2.x);
      line.setAttribute('y2', p2.y);
      line.setAttribute('stroke', stroke);
      line.setAttribute('stroke-width', y%16==0 ? '2' : '1');
      svg.appendChild(line);
    }
