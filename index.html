function focusMarkerByName(name) {
  let found = null

  //console.log('looking for', name);

  map.eachLayer((layer) => {
    if (layer instanceof L.Marker) {
      if (layer.feature.properties.name === name) found = layer;
    }
  })

  if (!found) return;

  if (found==currentOpenMarker) return; // do nothing if already selected

  found.fire('click');
  found.closeTooltip();

  map.panTo(found.getLatLng(), { animate: false });
}


function getIconHTML(feature, size=48) {

  let title = feature.properties.title;
  let options = null;

  options = options || {class:'fa fa-circle', bg:'dimgrey'};


  options.bg = regionColors[feature.properties.area] || 'dimgrey';

  if (feature.properties.area=='locations') {
    options.bg = 'dimgrey';
    options.class = 'fa fa-location';
    title = '';

  }


  let bg = options.bg || 'dimgrey';
  let fg = options.fg || 'white';

  let html = options.html || `<i class="${options.class}" style="color:${fg}"><span class="icon-text">${title}</span></i>`;

  return `<span class="icon-base icon-${size}" style="color:${bg}">${html}</span><div class="marker-label">${feature.properties.name}</div>`;
}

let baseIcon = (feature) => {
  let size = 48;
  return L.divIcon({
    className: 'divIcon',
    html: getIconHTML(feature, size),
    iconSize:     [size, size], // size of the icon
    iconAnchor:   [size/2, size-5], // point of the icon which will correspond to marker's location
    popupAnchor:  [0, -size*1], // point from which the popup should open relative to the iconAnchor
  });
};

function getCentroidRaw2(points) {
    if (!points || points.length < 3) return null;
    
    // Ensure polygon is closed (last point = first point)
    let closedPoints = [...points];
    if (closedPoints[0][0] !== closedPoints[closedPoints.length-1][0] || 
        closedPoints[0][1] !== closedPoints[closedPoints.length-1][1]) {
        closedPoints.push([closedPoints[0][0], closedPoints[0][1], closedPoints[0][2] || 0]);
    }
    
    let area = 0;
    let centroidX = 0;
    let centroidY = 0;
    
    for (let i = 0; i < closedPoints.length - 1; i++) {
        const x1 = closedPoints[i][0];
        const y1 = closedPoints[i][1];
        const x2 = closedPoints[i + 1][0];
        const y2 = closedPoints[i + 1][1];
        
        // Cross product for area contribution
        const cross = x1 * y2 - x2 * y1;
        area += cross;
        
        // Weighted sum for centroid
        centroidX += (x1 + x2) * cross;
        centroidY += (y1 + y2) * cross;
    }
    
    area = area / 2;
    
    // Handle degenerate polygons (area = 0)
    if (Math.abs(area) < 1e-10) {
        // Fallback to simple vertex average
        let sumX = 0, sumY = 0;
        const count = points.length;
        points.forEach(point => {
            sumX += point[0];
            sumY += point[1];
        });
        return [sumX / count, sumY / count, 0];
    }
    
    centroidX = centroidX / (6 * area);
    centroidY = centroidY / (6 * area);
    
    return [centroidX, centroidY, 0];
}

function drawMap() {
  // old map was 1920x1080 and the grid was almost precisely 10 pixels
  // center was at 860, 740
  // so basically an overhead screenshot is 192x108 grid
  // with grid center at cell 86,74 if count from top left corner

  let d = 192;

  let m = {
    size: d,

    bounds: [[0,0],[192,192]],

    center: [90,-89],

    flip_y: true,
  }

  let tileSize = 512; // this is essentially map size in tiles on zoom level 0
  let size = tileSize*tileSize; // default map width in pixels is tileSize squared

  // custom map weighted (scaled) dimensions (usually 0..1)
  let [sw,sh] = [m.size, m.size].map(e => e / size);
  let [sx,sy] = m.center.map(e => e / size);

  // calculate factor and offset for the custom map
  let factor = 1 / tileSize / sw;
  let dx = (.5 - sx / sw) * tileSize;
  let dy = (.5 - sy / sh) * tileSize;

  // correct bounds (still need to flip x and y for leaflet)
  let [w,h] = [m.size, m.size];
  let [x,y] = m.center;

  let [[left,top],[right,bottom]] = m.bounds;
  let bounds = [[top, left], [bottom, right]];
  let center = [(m.flip_y ? -1 : 1) * y, x];

  // crs.transformation represents an affine transformation:
  let crs = L.CRS.Simple;
  // a set of coefficients a, b, c, d for transforming a point of a form (x,y) into (a*x + b, c*y + d)
  crs.transformation = new L.Transformation(factor, dx, (m.flip_y ? -1 : 1) *  factor, dy); // Invert the y-axis

  map = L.map('map', {
    crs: crs,
    zoom: 3.5,
    center: center,
    zoomControl: false,
    maxZoom: 8,
    renderer: L.canvas({ padding: 0.5 }),

    zoomSnap: 0.5,
    //zoomDelta: 0.5,
    //wheelPxPerZoomLevel: 100,
  });

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.control.mousePosition({lngFirst: true, latFormatter:Math.round, lngFormatter:Math.round }).addTo(map);

  // Fit map to image bounds
  //map.fitBounds(bounds);

  markerGroup = L.layerGroup().addTo(map);

  let regionLayer = L.layerGroup();

  polygonLayer = L.geoJSON(regionData, {
      onEachFeature: (feature, layer) => {

        layer.setStyle({
            color: feature.properties.color,
            weight: 1,
            fillOpacity: 0.25
        });

        regionColors[feature.properties.name] = feature.properties.color;

        layer.on('mouseover', function(e) { this.setStyle({ fillOpacity: 0.5, weight: 2,}); this.bringToFront(); });
        layer.on('mouseout', function(e) { this.setStyle({ fillOpacity: 0.25, weight: 1, })});

  fetch('data/markers.json').then(r=>r.json()).then(data=>{

      let tw = iw/cellSize;
      let th = ih/cellSize;
      let top = dy;
      let left = dx;
      let bottom = th+dy;
      let right = tw+dx;
      return [[top,left],[bottom,right]];

    const origin = [cy - gh/2 + gh, cx - gw/2 + gw];

        [origin[0] - (vCells/2)*gh, origin[1] - (hCells/2)*gw],

    const latStep = 1 * gh;//(bounds[1][0] - bounds[0][0]) / steps;

    // vertical lines (meridians)
    for (let i = 0; i <= hCells-1; i++) {
        const lng = bounds[0][1] + i * lngStep;
        gridLayer.addLayer(L.polyline([
            [bounds[0][0], lng],
            [bounds[1][0], lng]
        ], gridStyle));
    }

    // horizontal lines (parallels)
    for (let i = 0; i <= vCells; i++) {
        const lat = bounds[0][0] + i * latStep;
        gridLayer.addLayer(L.polyline([
            [lat, bounds[0][1]],
            [lat, bounds[1][1]]
        ], gridStyle));
    }

    layers['polygons'] = polygonLayer;

    layers['regions'] = regionLayer;

    regionLayer.addTo(map);

    images = [];

    count = 0;

    let area = '';

    for (const feature of data.features) {

      let title = feature.properties.name;
      let name = feature.properties.name;

      if (area != feature.properties.area) count = 0;
      count = count + 1;

      area = feature.properties.area;

      if (area != 'locations') {
        images.push( {src: `images/levels/${name}.webp`, name: name, area: area, title: title});
      }

      let latlng = [feature.geometry.coordinates[1],feature.geometry.coordinates[0]];

      if (!latlng) continue;


      feature.properties.title = count;

      let marker = customMarker(latlng, feature);

      /*
      let marker = L.marker(latlng, {
        icon: L.divIcon({
          html: `
            <div class="custom-marker-container">
              <div class="marker-icon"></div>
              <div class="marker-label">${title}</div>
            </div>
          `,
          className: 'custom-marker', // for additional styling
          iconSize: [30, 50], // [width, height] - MUST include space for label
          iconAnchor: [15, 40] // [x, y] - point of the icon that corresponds to marker location
        }),

        searchText: (title).toLowerCase(),
      })
      */


      //let marker = L.marker(convert(feature.geometry.coordinates));

      counters[feature.properties.area] = (counters[feature.properties.area]||0) +1;

      marker.feature = feature;

      const getCoordinates = marker=>`${marker.feature.geometry.coordinates[0]},${marker.feature.geometry.coordinates[1]}`;

      const getTooltip = function(marker) {
        let name = marker.feature.properties.name;
        let lines = [`<b>${name}</b> / ${marker.feature.properties.area} (${getCoordinates(marker)})`];
        let s = (solutions[name]||'');
        if (s) {
          lines.push(`Soution: ${getMovesCount(s)} moves`);
        }
        return lines.join('<br/>');
      };

      marker.bindTooltip(getTooltip, {offset: [20,-35]});

      //marker.bindPopup(marker => { return `<div class="image-wrapper"><img src="images/levels/${marker.feature.properties.name}.webp"></div>`}, {

      marker.on('popupopen', () => {
        currentOpenMarker = marker;
        //location.hash = marker.feature.properties.name;

      marker.on('popupclose', () => {

        //location.hash = '';

      })

      marker.on('click', () => {
        const props = marker.feature.properties;
        const name = props.name;

        const buildWrapper = (bodyHTML) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'image-wrapper';
          let backlink = `<a class="copyable" href="${getMapURL(props.name)}" title="Click to copy link to clipboard"><i class="fa fa-link"></i></a>`;
          let html = `<b class="copyable" title="Click to copy name to clipboard">${props.name}</b></a> / ${props.area} (${getCoordinates(marker)}) ${backlink}`;
          html += bodyHTML;
          const s = solutions[props.name]||'';
          if (s) {
            html += `<span class="wrap"><a href="${getSolutionLink(name,true)}">Solution&nbsp;Player</a>&nbsp(${getMovesCount(s)}):&nbsp<span class="copyable" title="Click to copy solution to clipboard">${convertSolution(s)}</span></span>`;
          }
          wrapper.innerHTML = html;
          return wrapper;
        };

        const img = new Image();
        img.src = `images/levels/${name}.webp`;

        img.onload = () => {
          const wrapper = buildWrapper(`<a href="javascript:openGallery('${name}');" title="Click to open image gallery"><img class="popup-image" src="${img.src}"></a>`);
          marker.unbindPopup();
          marker.bindPopup(wrapper, { offset: [0,5], maxWidth: 360, minWidth: 360 });
          marker.openPopup();
        };

        img.onerror = () => {
          const wrapper = buildWrapper(`<div class="image-error"></div>`);
          marker.unbindPopup();
          marker.bindPopup(wrapper, { offset: [0,5] });
          marker.openPopup();
        };
      });



      if (!layers[feature.properties.area]) {
        layers[feature.properties.area] = L.layerGroup().addTo(markerGroup);
      }

      marker.addTo(layers[feature.properties.area]);

    }

    //console.log('total', data.features.length);
    //console.log(counters);

    let text =`Total markers: ${data.features.length}`;

    let alt = ''
    for (k in counters) {
      alt += `\n${k}: ${counters[k]}`;
    }

    //document.querySelector('#info').innerHTML = text;
    //document.querySelector('#info').title = alt;

    let baseLayers={}

    var blankTileLayer = L.tileLayer('https://via.placeholder.com/1x1/000000/ffffff?text=blank', {
        attribution: 'Blank Map'
    });

    baseLayers['blank'] = blankTileLayer;

    let tilesLayer = L.tileLayer('tiles/{z}/{y}/{x}.webp', {
      tileSize: 512,
      maxNativeZoom: 5,
      attribution: '<a href="https://github.com/joric/ootss/wiki" target=_blank>Joric\'s OotSS Map</a>',
    }).addTo(map);

    baseLayers['Demo2_16k'] = tilesLayer;

    // update overlay names to include count
    var overlaysWithCounts = Object.fromEntries(
      Object.entries(layers).map(([name, layer]) => {
        const hasMarkers = layer.getLayers ? layer.getLayers().some(l => l instanceof L.Marker) : layer instanceof L.Marker;
        const count = layer.getLayers ? layer.getLayers().filter(l => l instanceof L.Marker).length : (layer instanceof L.Marker ? 1 : 0);
        return [`${name}${hasMarkers ? ' ('+count+')' : ''}`, layer];
      })
    );

    let layercontrol = L.control.layers(baseLayers, overlaysWithCounts, {collapsed: false, position: 'topright'}).addTo(map);


    map.on('zoom overlayadd', updateZoom);


    updateZoom();

    searchControl = new L.Control.Search({propertyName: 'searchText', initial: false, layer: markerGroup, hideMarkerOnCollapse: true}).addTo(map);


    // mini map

    /*

    let t = 1.25;

    var miniMapLayer = L.tileLayer('tiles/{z}/{y}/{x}.webp', {
      minZoom: -5,
      minNativeZoom: 0,
      maxNativeZoom: 5,
      tileSize: 512,
    });

    let bounds = {left:-6, top:143, right: 188, bottom: 35};
    let center = [bounds.left + (bounds.right-bounds.left)/2, bounds.top + (bounds.bottom-bounds.top)/2];

    var mini = new L.Control.MiniMap(miniMapLayer, {
      toggleDisplay: true,

      width: 192*t,
      height: 108*t,

      zoomLevelOffset: 0,
      zoomLevelFixed: -1,

      centerFixed: center,

      aimingRectOptions: {color: "#ffffff", weight: 2, clickable: true, opacity: 1, fillOpacity: 0},
      shadowRectOptions: {color: "#000000", weight: 2, clickable: true, opacity: 0, fillOpacity: 0},
  
      position:'bottomleft',

      //minimized: true,
    }).addTo(map);

    mini._miniMap.on('mousedown', e => {

        if (e.originalEvent.buttons === 1) {
            map.panTo(e.latlng, { animate: false });
        }
    });

    mini._miniMap.scrollWheelZoom.disable();
    mini._miniMap.doubleClickZoom.disable();
    mini._miniMap.boxZoom.disable();
    mini._miniMap.touchZoom.disable();
    mini._miniMap.keyboard.disable();
    mini._miniMap.dragging.disable(); // optional: also prevent panning
        */

    initImages();

    let name = mapParam.markerName;
    mapParam = {};
    if (name) {
      focusMarkerByName(name);
    }


  })

  function drawGrid() {

    svgLayer = layers['grid'] || L.svg({padding: 2});

    svgLayer.addTo(map);

    svg = svgLayer._container;

    if (!svg) return;

    //console.log('drawGrid', svg);

    while (svg.firstChild) svg.removeChild(svg.firstChild);

    //if (map.getZoom() <= 6) return;

    const size = 2048;

    const topLeft = map.containerPointToLatLng([0,0]);
    const bottomRight = map.containerPointToLatLng([map.getSize().x,map.getSize().y]);

    const spacing = 10;

    const minX = Math.max(0, Math.floor(Math.min(topLeft.lng, bottomRight.lng)));
    const maxX = Math.min(size, Math.ceil(Math.max(topLeft.lng, bottomRight.lng)));
    const minY = Math.max(0, Math.floor(Math.min(topLeft.lat, bottomRight.lat)));
    const maxY = Math.min(size, Math.ceil(Math.max(topLeft.lat, bottomRight.lat)));

    let stroke = 'rgba(255,255,255,0.75)';

    for (let x = minX; x <= maxX; x += spacing) {
      const p1 = map.latLngToLayerPoint([minY, x]);
      const p2 = map.latLngToLayerPoint([maxY, x]);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', p1.x);
      line.setAttribute('y1', p1.y);
      line.setAttribute('x2', p2.x);
      line.setAttribute('y2', p2.y);
      line.setAttribute('stroke', stroke);
      line.setAttribute('stroke-width', x%16==0 ? '2':'1');
      svg.appendChild(line);
    }

    for (let y = minY; y <= maxY; y += spacing) {
      const p1 = map.latLngToLayerPoint([y, minX]);
      const p2 = map.latLngToLayerPoint([y, maxX]);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', p1.x);
      line.setAttribute('y1', p1.y);
      line.setAttribute('x2', p2.x);
      line.setAttribute('y2', p2.y);
      line.setAttribute('stroke', stroke);
      line.setAttribute('stroke-width', y%16==0 ? '2' : '1');
      svg.appendChild(line);
    }

    for (let y = minY; y < maxY; y += spacing) {

        stroke = brightness > 128 ? 'black' : 'white';
        const hex = '#' + [r,g,b].map(x => x.toString(16).padStart(2, '0')).join('')

        if (map.getZoom()==9) {
            const point = map.latLngToLayerPoint([y+.5, x+.5]);
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');

            text.textContent = hex;
            svg.appendChild(text);
        } else {
          let labels = [`${hex}`,`${r},${g},${b}`];
          const point = map.latLngToLayerPoint([y, x]);
          for (const i in labels ) {
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('font-size', '13');
            text.setAttribute('fill', stroke);
            text.setAttribute('x', point.x+10);
            text.setAttribute('y', point.y+10 + i*16);
            text.setAttribute('text-anchor', 'start');
            text.setAttribute('dominant-baseline', 'hanging');
            text.textContent = labels[i];
            svg.appendChild(text);
          }
        }
      }
    }
    */
  }

  document.addEventListener("keydown",function (e) {

    if (e.target.id.startsWith('searchtext')) return;

    if (e.code=='KeyF') {
      if (e.ctrlKey) {
        searchControl.expand(true);
        e.preventDefault();
      } else {
        //map.toggleFullscreen();
      }

    } else if (e.code=='Enter') {

      if (isGalleryOpen()) {
        selectImage();
      } else {
        if (currentOpenMarker) {
          openGallery(currentOpenMarker.feature.properties.name);
        }
      }
      
    } else if (e.code=='Escape') {
      toggleGallery();
    }
  });

}

window.onload = function() {

  if (location.hash.length>1) {
    let param = decodeURIComponent(location.hash.slice(1));
    mapParam.markerName = param;
  }

  document.addEventListener('click', (e) => {
    const el = e.target.closest('.copyable');
    if (el) {
      // Don't prevent default if Ctrl/Cmd key is held (allow navigation)
      if (e.ctrlKey || e.metaKey) {
        return;
      }
      e.preventDefault();
      let text;
      if (el.tagName === 'A' && el.href) {
        text = el.href;
      } else {
        text = el.textContent.trim();
      }
      if (text) {
        copyToClipboard(text);
      }
    }
  });

  fetch('data/solutions.txt').then(r => r.text()).then(data => {
    solutions = Object.fromEntries(data.split('\n').map(s => s.trim().split(':', 2)).filter(([, v])=> v && v.length>=2));
    const a = Object.values(solutions).map(s=>s.length);
    if (a) {
      console.log(`${a.length} solutions, ${Math.min(...a)} min, ${Math.max(...a)} max, ${~~(a.reduce((x,y)=>x+y,0)/a.length)} average`);
    }
  });

  fetch('data/regions.json').then(r=>r.json()).then(data=>{
    regionData = data;
    drawMap();
  });
}
