<script src="js/scripts_play_compiled.js"></script>

<script>

let solutions = {};
let pos = 0;
let levelName = '';
let prevLevelNo = -1;

const unpackSolution = s => s.replace(/([A-Z])(\d+)/g, (_,l,n)=>l.repeat(+n));
const convertSolution = s => unpackSolution(s).toLowerCase();

const keyCodes = {
  // solution keycodes
  r: 39, // right
  l: 37, // left
  u: 38, // up
  d: 40, // down
  x: 88, // X
  c: 67, // C
  v: 86, // V

  // other keycodes
  undo: 90, // Z
  reset: 82, // R
  digit1: 49,
  digit2: 50,
  digit3: 51,

  // for btnKey
  KeyR: 82, // R
  KeyX: 88, // X
  KeyC: 67, // C
  KeyZ: 90, // Z
};

function getMapLink(name) {
  let mapBase = location.protocol === 'file:' ? 'index.html' : './';
  return name ? mapBase + '#' + name : mapBase;
}

function updateControls() {
  document.title = `${levelName} - ${state.metadata.title}`;

  const select = document.getElementById('levelSelect');
  if (select) select.value = levelName;

  const pin = document.getElementById('pin');
  if (pin) pin.href = getMapLink(levelName);


  let solution = (convertSolution(solutions[levelName]||'')).toUpperCase();

  if (pos>=solution.length) {
    pos = solution.length;
  }

  let at = solution[pos] || ' ';
  let before = solution.slice(0, pos);
  let after = solution.slice(pos + 1);

  /*
  if (pos>=solution.length) {
    at = '-';
    before='';
    after='';
  }
  */

  document.getElementById('moves-before').textContent = before;
  document.getElementById('moves-at').textContent = at;
  document.getElementById('moves-after').textContent = after;
}

function monitorLevelUpdate() {
  if (curLevelNo != prevLevelNo) {
    prevLevelNo = curLevelNo;
    levelName = state.levels[curLevelNo].section;
    console.log(`level change ${levelName}`);
    pos = 0;
    updateControls();
  }
}


function dispatchFakeKey(type, code) {
  const fakeEvent = new KeyboardEvent(type, {
    bubbles: true,
    cancelable: true,
  });
  Object.defineProperty(fakeEvent, 'keyCode', { get: () => code });
  Object.defineProperty(fakeEvent, 'which', { get: () => code });
  document.dispatchEvent(fakeEvent);
}

function sendKey(id) {
  sendMove(keyCodes[id]);
}

function move(id) {
  if (id === 'left') {
    sendMove(keyCodes.l);
  } else if (id === 'right') {
    sendMove(keyCodes.r);
  } else if (id === 'up') {
    sendMove(keyCodes.u);
  } else if (id === 'down') {
    sendMove(keyCodes.d);
  }
}

function showSolution(){
}
function stopSolution(){
  pos = 0;
  pauseSolution();
  updateControls();
}
function pauseSolution(){
}

function undo() {
  sendMove(keyCodes.undo); // Z
  if (pos > 0) {
    pos--;
  }
  updateControls();
}

function prevMove() {
  showSolution();
/*
  if (pos > 0) {
    pos--;
  }
  updateControls();
*/
  // just use undo here, too confusing
  undo();
}

function sendMove(code) {
  const canvas = document.getElementById('gameCanvas');
  canvas.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));

  updateControls();

  dispatchFakeKey('keydown', code);
  dispatchFakeKey('keyup', code);
}


function sendNextMove() {
  let solution = convertSolution(solutions[levelName]||'');

  if (pos < solution.length) {
    const ch = solution[pos].toLowerCase();

    //console.log('sending', ch, 'of', solution.slice(pos), 'at', pos, 'from', name);

    const code = keyCodes[ch];
    if (code !== undefined) {
      sendMove(code);
      pos++;
      //console.log(`[${pos}/${solution.length}] sent '${ch}'`);
    } else {
      console.warn(`Unknown symbol '${ch}' at position ${pos}, skipping`);
      pos++;
    }

    if (pos==solution.length-1) console.log('Solution complete.');

    playing = timer != null;

  } else {
    pauseSolution();
  }

  updateControls();
}

function nextMove() {
  showSolution();
  sendNextMove()
}


function reset() {
}

function move(id) {
  if (id === 'left') {
    sendMove(keyCodes.l);
  } else if (id === 'right') {
    sendMove(keyCodes.r);
  } else if (id === 'up') {
    sendMove(keyCodes.u);
  } else if (id === 'down') {
    sendMove(keyCodes.d);
  }
}

function init() {
  document.querySelectorAll('.btnKey').forEach(c=>{ c.onclick = e=> { sendKey(e.target.id); } });

  document.querySelectorAll('.btnFn').forEach(c=>{ c.onclick = e=> { 
    //console.log(typeof window[e.target.id]);
    if (typeof window[e.target.id] === 'function') window[e.target.id](); }
  });

  document.querySelectorAll('.btnMove').forEach(c=>{
    c.onmousedown = c.ontouchstart = e=>{ e.preventDefault(); move(e.target.id); };
    c.onmouseup = c.onmouseout = c.ontouchend = ()=>pressed={};
  });

  document.getElementById('muteButton').addEventListener('click', ()=>{ localStorage.mute = true; });
  document.getElementById('unMuteButton').addEventListener('click', () => { localStorage.removeItem('mute'); });
  if (localStorage.mute) {
    muteAudio();
  }

  if (location.hash) {
    let levelName = location.hash.slice(1);
    setTimeout(()=>{ loadLevel(levelName); }, 500);
  }

  const select = document.getElementById('levelSelect');
  if (select) {
    select.innerHTML = '';
    for (const i in state.levels) {
      const option = document.createElement('option');
      const name = state.levels[i].section;
      option.value = name;
      option.textContent = name;
      select.appendChild(option);
    }
  }

  setInterval(monitorLevelUpdate, 20);

}

function postLoading() {
  fetch('data/solutions.txt').then(r => r.text()).then(data => {
    solutions = Object.fromEntries(data.split('\n').map(s => s.trim().split(':', 2)).filter(([, v])=> v && v.length>=2));
    const a = Object.values(solutions).map(s=>s.length);
    if (a) {
      console.log(`${a.length} solutions`);
    }
    init();
  });
}

function loadLevel(name) {
  levelName = name;
  console.log('loading level', name);
  for (const i in state.levels) {
    if (state.levels[i].section==name) {
      console.log('found level number', i, name);
      pos = 0;
      updateControls();
      location.hash = name;
      updateControls();
      gotoLevel(i);
      break;
    }
  }
}


function stepLevel(step) {

  let i = curLevelNo + step;
  const name = state.levels[i].section;

  location.hash = name;

  updateControls();
  gotoLevel(i);
}

function nextLevel() {
  stepLevel(1);
}

function prevLevel() {
  stepLevel(-1);
}


function displayError(message) {
  var errorText = document.getElementById("errormessage");
  errorText.innerHTML ="ERROR "+message+"<br>";
}

function getParameterByName(name) {
    name = name.replace(/[\[]/, "\\\[").replace(/[\]]/, "\\\]");
    var regex = new RegExp("[\\?&]" + name + "=([^&#]*)"),
        results = regex.exec(location.search);
    return results == null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
}

function strip_http(url) {
   url = url.replace(/^https?:\/\//,'');
   return url;
}

function getData() { 
/*
  let id = getParameterByName("p").replace(/[\\\/]/,"");
  if (id && id.length > 0) {
        tryLoadGist(id, `https://api.github.com/gists/${id}`);
    } else {
        id = getParameterByName("demo");
      if (id && id.length > 0) {
            tryLoadFile(id, `demo/${id}.txt`);
        } else {
        displayError("No ID specified in URL.")
        return;
        }
  }
*/
  let id = 1;
  tryLoadFile(id, `scripts/ootss-next.pz`);
}

function tryLoadGist(id, githubURL) {

  var githubHTTPClient = new XMLHttpRequest();
  githubHTTPClient.open('GET', githubURL);
  githubHTTPClient.onreadystatechange = function() {
    if(githubHTTPClient.readyState!=4) {
      return;
    }   
    var result = JSON.parse(githubHTTPClient.responseText);
    if (githubHTTPClient.status===403) {
      displayError(result.message);
    } else if (githubHTTPClient.status!==200&&githubHTTPClient.status!==201) {
      displayError("HTTP Error "+ githubHTTPClient.status + ' - ' + githubHTTPClient.statusText);
    }
    var result = JSON.parse(githubHTTPClient.responseText);
    prepareForPlay(`hack=${id}`, result["files"]["script.txt"]["content"]);
    }
    // if (storage_has('oauth_access_token')) {
    //     var oauthAccessToken = storage_get("oauth_access_token");
    //     if (typeof oauthAccessToken === "string") {
    //         githubHTTPClient.setRequestHeader("Authorization","token "+oauthAccessToken);
    //     }
    // }
  githubHTTPClient.setRequestHeader("Content-type","application/x-www-form-urlencoded");
  githubHTTPClient.send();
}

function tryLoadFile(id, fileName) {
  var fileOpenClient = new XMLHttpRequest();
  fileOpenClient.open('GET', fileName);
  fileOpenClient.onreadystatechange = function() {
    
      if (fileOpenClient.readyState!=4)
        return;
    if (fileOpenClient.status != 200 && fileOpenClient.status != 201) {
      displayError("HTTP Error "+ fileOpenClient.status + ' - ' + fileOpenClient.statusText);
    } else {
      prepareForPlay(`demo=${id}`, fileOpenClient.responseText);
    }
  }
  fileOpenClient.send();
}

function prepareForPlay(hackArg, code) {
    compile(["restart"],code);

    if (state.metadata.homepage!==undefined) {
        var homepage=state.metadata.homepage;
        var homepageLink = document.getElementById("homepagelink");
        homepageLink.textContent=strip_http(homepage);
        if (!homepage.match(/^https?:\/\//)) {
            homepage = "https://" + homepage;
        }
        homepageLink.href = homepage;
    }
    if (state.metadata.title!==undefined) {
        var title=state.metadata.title;
        var gametitle = document.getElementById("gametitle");
        gametitle.textContent=title;
        window.document.title=title+" - PuzzleScriptNext Game";
    }
            
    var hacklink = document.getElementById("hacklink");
    var url = `editor.html?${hackArg}`;
    url=qualifyURL(url);
    hacklink.href=url;

    postLoading();
}

window.onload = () => {

  getData();

  window.addEventListener('keydown', function (e) {

    //console.log(e.code);

    switch (e.code) {
      case 'BracketRight':
        e.preventDefault();
        nextMove();
        break;
      case 'BracketLeft':
        e.preventDefault();
        prevMove();
        break;
      case 'KeyR':
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault();
          location.reload();
        } else {
          stopSolution();
          console.log('Rewound to start.');
        }
        break;


      case 'Home': firstLevel(); break;

      case 'KeyZ':
        if (e.shiftKey) prevLevel();
        break;
      case 'KeyX':
        if (e.shiftKey) nextLevel();
        break;

      case 'PageUp': prevLevel(); break;
      case 'PageDown': nextLevel(); break;

      case 'End': lastLevel(); break;

      case 'KeyE':
        play();
        break;

      case 'KeyW': case 'ArrowUp':
      case 'KeyA': case 'ArrowLeft':
      case 'KeyS': case 'ArrowDown':
      case 'KeyD': case 'ArrowRight':
        //pos+=1;
        updateControls();
      break;

      default:
        break;
    }
  }, true); // capture state, required to work

}

</script>
